name: Deploy to GitHub Pages

# Pages 以分支模式服务 gh-pages 分支；本工作流在 main 更新时自动同步过去。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to gh-pages
        run: git push --force origin HEAD:gh-pages
