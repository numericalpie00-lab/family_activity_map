name: Deploy to GitHub Pages

# 站点已下线：自动同步已停用，仅保留手动触发（workflow_dispatch）。
# 需要重新上线时：改回 push 触发并手动运行本工作流，即可重建 gh-pages 分支。
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to gh-pages
        run: git push --force origin HEAD:gh-pages
